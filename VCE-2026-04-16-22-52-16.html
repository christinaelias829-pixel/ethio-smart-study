<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethio Study Pro AI</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Fredoka', Arial; background:#fafafa; }

/* DARK MODE */
body.dark { background:#0f0f1a; color:white; }
body.dark .hero { filter:brightness(0.7); }
body.dark .card { background:#1c1c2e; color:white; }

/* HERO */
.hero {
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
position:relative;
background-image:url("https://www.mrscarterhla.com/uploads/6/2/4/2/62424987/iewek-gnos-hhux08puypc-unsplash_orig.jpeg");
background-size:cover;
background-position:center;
}

.hero-box {
background:rgba(255,255,255,0.85);
padding:50px;
border-radius:30px;
backdrop-filter:blur(10px);
}

/* HERO CONTROLS */
.hero-controls{
position:absolute;
top:20px;
right:20px;
display:flex;
gap:10px;
}

/* BUTTON */
.btn {
padding:15px 30px;
border:none;
border-radius:25px;
background:#9b30ff;
color:white;
cursor:pointer;
margin:5px;
font-size:16px;
}

/* DASHBOARD */
.content { display:none; padding:40px; background:#6a0dad; color:white; text-align:center;}
.card {
display:inline-block;
padding:20px;
margin:10px;
background:white;
color:#6a0dad;
border-radius:15px;
cursor:pointer;
width:140px;
}

/* LOGO */
.logo{ font-size:50px; margin-bottom:20px; }

/* PAGE */
.page { display:none; padding:40px; text-align:center; }

/* TIMER */
.timer-box {
background:#ffd6e7;
padding:50px;
border-radius:30px;
display:inline-block;
}

/* TABLE */
table { width:90%; margin:auto; border-collapse:collapse; background:white; }
td,th { border:1px solid #ccc; padding:10px; }
.break-row { background:#ffe5b4; }

/* NAV */
.nav-bar { position:fixed; bottom:20px; right:20px; }

/* CALENDAR */
.calendar-box{
background:white;
padding:20px;
border-radius:20px;
width:300px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
body.dark .calendar-box{ background:#1c1c2e; color:white; }

/* FLOATING FOCUS TIMER */
#lockScreen{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
background:#000;
color:white;
padding:10px 20px;
border-radius:20px;
z-index:9999;
font-size:18px;
display:none;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="hero">

<div class="hero-controls">
<button class="btn" onclick="toggleTheme()">🌙</button>
<button class="btn" onclick="location.reload()">🏠</button>
</div>

<div class="hero-box">
<h1>ETHIO STUDY PRO</h1>
<p>Smart Study System</p>
<button class="btn" onclick="showSection('content')">Start</button>
</div>
</div>

<!-- DASHBOARD -->
<div class="content" id="content">
<div class="logo">📖✨</div>

<h2>Dashboard</h2>
<div class="card" onclick="showSection('plannerPage')">📅 Planner</div>
<div class="card" onclick="showSection('timerPage')">⏱ Timer</div>
<div class="card" onclick="showSection('calendarPage')">🗓 Calendar</div>
<div class="card" onclick="showSection('booksPage')">📚 Books</div>
<div class="card" onclick="showSection('focusPage')">🔒 Focus Lock</div>
</div>

<!-- FOCUS PAGE -->
<div class="page" id="focusPage">
<h2>🔒 Focus Lock</h2>

<input id="fh" placeholder="HH">
<input id="fm" placeholder="MM">
<input id="fs" placeholder="SS"><br><br>

<button class="btn" onclick="startFocus()">Start Lock</button>
<button class="btn" onclick="showSection('content')">⬅ Back</button>
</div>

<!-- FLOATING TIMER -->
<div id="lockScreen">
<div id="lockTime">00:00:00</div>
</div>

<!-- PLANNER -->
<div class="page" id="plannerPage">
<h2>Smart Planner</h2>

<input id="subjects" placeholder="Math, Biology"><br><br>

Start: <input id="startTime" type="time">
End: <input id="endTime" type="time"><br><br>

Break: <input id="breakTime" type="number" value="10"> minutes<br><br>

<button class="btn" onclick="generateSmartPlan()">Generate Plan</button>

<table id="planTable"></table>
</div>

<!-- TIMER -->
<div class="page" id="timerPage">
<div class="timer-box">

<h1 id="displayTime">00:00:00</h1>

<input id="th" placeholder="HH">
<input id="tm" placeholder="MM"><br><br>

<button class="btn" onclick="setTimer()">Set</button>
<button class="btn" onclick="startTimer()">Start</button>
<button class="btn" onclick="pauseTimer()">Pause</button>
<button class="btn" onclick="takeBreak()">Break</button>

</div>
</div>

<!-- CALENDAR -->
<div class="page" id="calendarPage">
<h2>Calendar</h2>

<div class="calendar-box">
<input id="eventDate" type="date"><br><br>
<input id="eventTime" type="time"><br><br>
<input id="eventNote" placeholder="Event"><br><br>

<button class="btn" onclick="addEvent()">Save</button>
<button class="btn" onclick="cancelEvent()">Cancel</button>
<button class="btn" onclick="deleteAll()">Delete All</button>

<div id="calendarList"></div>
</div>
</div>

<!-- BOOKS -->
<div class="page" id="booksPage">
<h2>Books & Study Tools</h2>

<div id="gradeContainer"></div>

<h3>✨ Smart Study Tools</h3>

<div class="card" onclick="openStudyTool('gizmo')">🤖 Gizmo AI</div>
<div class="card" onclick="openStudyTool('turbo')">⚡ Turbo AI</div>
<div class="card" onclick="openStudyTool('kata')">💻 Learn Kata</div>
</div>

<!-- NAV -->
<div class="nav-bar">
<button onclick="showSection('content')">⬅</button>
<button onclick="location.reload()">🏠</button>
<button onclick="toggleTheme()">🌙</button>
<button onclick="stopAlarm()">🔇</button>
</div>

<!-- AUDIO -->
<audio id="alarmSound" loop>
<source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
</audio>

<script>

/* THEME */
function toggleTheme(){ document.body.classList.toggle("dark"); }

/* NAV */
function showSection(id){
document.querySelectorAll('.hero,.content,.page').forEach(d=>d.style.display='none');
document.getElementById(id).style.display='block';
if(id==='booksPage') loadGrades();
}

/* ALARM */
const alarm=document.getElementById("alarmSound");
function playAlarm(){alarm.currentTime=0;alarm.play();}
function stopAlarm(){alarm.pause();alarm.currentTime=0;}

/* FOCUS LOCK (GLOBAL) */
let focusTime=0,focusInterval;

function startFocus(){
focusTime=(+fh.value||0)*3600+(+fm.value||0)*60+(+fs.value||0);

lockScreen.style.display="block";
showSection('content'); // go back but keep running

clearInterval(focusInterval);

focusInterval=setInterval(()=>{
if(focusTime<=0){
clearInterval(focusInterval);
lockScreen.style.display="none";
playAlarm();
alert("🎉 Focus session completed!");
return;
}

focusTime--;

let h=String(Math.floor(focusTime/3600)).padStart(2,'0');
let m=String(Math.floor((focusTime%3600)/60)).padStart(2,'0');
let s=String(focusTime%60).padStart(2,'0');

lockTime.innerText=`🔒 Focus: ${h}:${m}:${s}`;

},1000);
}

/* TIMER */
let timerInt,totalSeconds=0;

function setTimer(){
totalSeconds=(+th.value||0)*3600+(+tm.value||0)*60;
updateDisplay();
}

function updateDisplay(){
let h=Math.floor(totalSeconds/3600).toString().padStart(2,'0');
let m=Math.floor((totalSeconds%3600)/60).toString().padStart(2,'0');
let s=(totalSeconds%60).toString().padStart(2,'0');
displayTime.innerText=`${h}:${m}:${s}`;
}

function startTimer(){
clearInterval(timerInt);
timerInt=setInterval(()=>{
if(totalSeconds<=0){
clearInterval(timerInt);
playAlarm();
alert("⏰ Time up!");
return;
}
totalSeconds--;
updateDisplay();
},1000);
}

function pauseTimer(){clearInterval(timerInt);}
function takeBreak(){clearInterval(timerInt);alert("Take a break ☕");}

/* CALENDAR */
let events=JSON.parse(localStorage.getItem('events')||'[]');

function addEvent(){
events.push({d:eventDate.value,t:eventTime.value,n:eventNote.value});
localStorage.setItem('events',JSON.stringify(events));
render();
}

function cancelEvent(){
eventDate.value="";eventTime.value="";eventNote.value="";
}

function deleteAll(){
events=[];localStorage.setItem('events','[]');render();
}

function render(){
calendarList.innerHTML=events.map(e=>`<div>${e.d} ${e.t} - ${e.n}</div>`).join('');
}
render();

/* PLANNER */
function toMins(t){let[a,b]=t.split(':').map(Number);return a*60+b;}
function fromMins(m){let h=Math.floor(m/60);let mm=m%60;return `${h.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}`;}

function generateSmartPlan(){
let subs=subjects.value.split(',').map(s=>s.trim()).filter(s=>s);
let start=toMins(startTime.value);
let end=toMins(endTime.value);
let breakT=parseInt(breakTime.value)||0;

let total=end-start;
let study=Math.floor((total-(breakT*(subs.length-1)))/subs.length);

let html="<tr><th>Activity</th><th>Start</th><th>End</th></tr>";
let current=start;

subs.forEach((s,i)=>{
html+=`<tr><td>${s}</td><td>${fromMins(current)}</td><td>${fromMins(current+study)}</td></tr>`;
current+=study;

if(i<subs.length-1){
html+=`<tr class="break-row"><td>Break</td><td>${fromMins(current)}</td><td>${fromMins(current+breakT)}</td></tr>`;
current+=breakT;
}
});

planTable.innerHTML=html;
}

/* BOOKS */
function loadGrades(){
let c="";
for(let i=1;i<=12;i++){
c+=`<div class="card" onclick="window.open('https://kehulum.com/student-textbook/new/grade-${i}')">Grade ${i}</div>`;
}
gradeContainer.innerHTML=c;
}

/* TOOLS */
function openStudyTool(tool){
if(tool==="gizmo"){ window.open("https://gizmo.ai"); }
if(tool==="turbo"){ window.open("https://turbo.ai"); }
if(tool==="kata"){ window.open("https://learnkata.com"); }
}

</script>

</body>
</html>
